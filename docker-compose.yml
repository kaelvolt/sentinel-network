version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: kael-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-kael}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-kaelpass}
      POSTGRES_DB: ${DB_NAME:-kael_platform}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-kael} -d ${DB_NAME:-kael_platform}']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kael-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
